name: Daily Market Update

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 22h horário de Brasília (UTC-3), dias úteis
  workflow_dispatch:         # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar atualização diária
        run: python run_all.py

      - name: Publicar branch deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan deploy-temp
          git add -A
          git commit -m "deploy: $(date +'%Y-%m-%d')"
          git push --force origin deploy-temp:deploy